# =========================================================
# CloudFormation Template Version
# =========================================================
AWSTemplateFormatVersion: '2010-09-09'


# =========================================================
# Stack Description
# =========================================================
Description: EC2 CloudWatch Slack Alert Infrastructure


# =========================================================
# Parameters
# =========================================================
Parameters:

  SlackWebhookUrl:
    Type: String
    NoEcho: true

  EC2InstanceId:
    Type: AWS::EC2::Instance::Id


# =========================================================
# Resources
# =========================================================
Resources:


  # =========================================================
  # SNS Topic
  # =========================================================
  SlackAlertsTopic:

    Type: AWS::SNS::Topic

    Properties:

      TopicName: !Sub ${AWS::StackName}-slack-alerts

      Tags:

        - Key: Project
          Value: Monitoring

        - Key: ManagedBy
          Value: CloudFormation




  # =========================================================
  # IAM Role For Lambda
  # =========================================================
  SlackAlertLambdaRole:

    Type: AWS::IAM::Role

    Properties:

      RoleName: !Sub ${AWS::StackName}-slack-alert-role

      AssumeRolePolicyDocument:

        Version: '2012-10-17'

        Statement:

          - Effect: Allow

            Principal:

              Service:
                - lambda.amazonaws.com

            Action:
              - sts:AssumeRole


      ManagedPolicyArns:

        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole


      Tags:

        - Key: Project
          Value: Monitoring

        - Key: ManagedBy
          Value: CloudFormation




  # =========================================================
  # Lambda Function
  # =========================================================
  SlackAlertLambda:

    Type: AWS::Lambda::Function

    Properties:

      FunctionName: !Sub ${AWS::StackName}-slack-alert-handler

      Runtime: nodejs20.x

      Handler: index.handler

      Role: !GetAtt SlackAlertLambdaRole.Arn

      Timeout: 15

      MemorySize: 128

      ReservedConcurrentExecutions: 2

      Architectures:
        - arm64

      Environment:

        Variables:

          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl


      Code:

        ZipFile: |
          const https = require('https');
          const { URL } = require('url');

          const SLACK_WEBHOOK_URL = process.env.SLACK_WEBHOOK_URL;


          // =================================================
          // Alert Styling Configuration
          // =================================================
          const ALARM_CONFIG = {

              ALARM: {
                  color: '#FF0000',
                  emoji: ':red_circle:',
                  label: 'CRITICAL ALERT'
              },

              OK: {
                  color: '#36A64F',
                  emoji: ':white_check_mark:',
                  label: 'RESOLVED'
              }
          };


          // =================================================
          // Extract AWS Region From SNS ARN
          // =================================================
          function getRegionFromArn(arn) {

              try {

                  return arn.split(':')[3];

              } catch (err) {

                  return 'ap-south-1';
              }
          }


          // =================================================
          // Format Timestamp In IST
          // =================================================
          function formatTimestamp(timestamp) {

              try {

                  return new Date(timestamp).toLocaleString(
                      'en-IN',
                      {
                          timeZone: 'Asia/Kolkata',

                          year: 'numeric',

                          month: 'short',

                          day: '2-digit',

                          hour: '2-digit',

                          minute: '2-digit',

                          second: '2-digit',

                          hour12: true
                      }
                  ) + ' IST';

              } catch (err) {

                  return timestamp;
              }
          }


          // =================================================
          // Build Slack Message Payload
          // =================================================
          function buildSlackMessage(alarm) {

              // Ignore:
              // INSUFFICIENT_DATA -> OK
              if (
                  alarm.previous_state === 'INSUFFICIENT_DATA' &&
                  alarm.state === 'OK'
              ) {

                  return null;
              }

              let config;


              // =================================================
              // Alarm Resolved
              // =================================================
              if (
                  alarm.previous_state === 'ALARM' &&
                  alarm.state === 'OK'
              ) {

                  config = ALARM_CONFIG.OK;
              }

              // =================================================
              // Alarm Triggered
              // =================================================
              else if (alarm.state === 'ALARM') {

                  config = ALARM_CONFIG.ALARM;
              }

              // Ignore Other Transitions
              else {

                  return null;
              }


              // =================================================
              // CloudWatch Alarm Console Link
              // =================================================
              const alarmLink =
                  `https://${alarm.region}.console.aws.amazon.com/cloudwatch/home` +
                  `?region=${alarm.region}#alarmsV2:alarm/${encodeURIComponent(alarm.alarm_name)}`;


              return {

                  attachments: [{

                      color: config.color,

                      blocks: [

                          // =================================================
                          // Header
                          // =================================================
                          {
                              type: 'header',

                              text: {
                                  type: 'plain_text',

                                  text:
                                      `${config.emoji} ${config.label}: ${alarm.alarm_name}`,

                                  emoji: true
                              }
                          },


                          // =================================================
                          // Main Alarm Details
                          // =================================================
                          {
                              type: 'section',

                              fields: [

                                  {
                                      type: 'mrkdwn',

                                      text:
                                          `*Metric:*\n${alarm.namespace} → ${alarm.metric_name}`
                                  },

                                  {
                                      type: 'mrkdwn',

                                      text:
                                          `*State Change:*\n${alarm.previous_state} → *${alarm.state}*`
                                  },

                                  {
                                      type: 'mrkdwn',

                                      text:
                                          `*Account ID:*\n\`${alarm.account_id}\``
                                  },

                                  {
                                      type: 'mrkdwn',

                                      text:
                                          `*Time:*\n${formatTimestamp(alarm.timestamp)}`
                                  }
                              ]
                          },


                          // =================================================
                          // Description
                          // =================================================
                          {
                              type: 'section',

                              text: {
                                  type: 'mrkdwn',

                                  text:
                                      `*Description:*\n${alarm.description}`
                              }
                          },


                          // =================================================
                          // Reason
                          // =================================================
                          {
                              type: 'section',

                              text: {
                                  type: 'mrkdwn',

                                  text:
                                      `*Reason:*\n${alarm.reason}`
                              }
                          },


                          // =================================================
                          // AWS Console Link
                          // =================================================
                          {
                              type: 'section',

                              text: {
                                  type: 'mrkdwn',

                                  text:
                                      `🔍 <${alarmLink}|View Alarm in AWS Console>`
                              }
                          }
                      ]
                  }]
              };
          }


          // =================================================
          // Send Message To Slack
          // =================================================
          function sendToSlack(payload) {

              return new Promise((resolve, reject) => {

                  const url = new URL(SLACK_WEBHOOK_URL);

                  const data = JSON.stringify(payload);

                  const options = {

                      hostname: url.hostname,

                      path: url.pathname + url.search,

                      method: 'POST',

                      headers: {
                          'Content-Type': 'application/json',
                          'Content-Length': Buffer.byteLength(data)
                      }
                  };


                  const req = https.request(options, (res) => {

                      let responseBody = '';

                      res.on('data', (chunk) => {

                          responseBody += chunk;
                      });


                      res.on('end', () => {

                          if (
                              res.statusCode >= 200 &&
                              res.statusCode < 300
                          ) {

                              resolve(responseBody);

                          } else {

                              reject(

                                  new Error(

                                      `Slack webhook failed: ${res.statusCode} ${responseBody}`
                                  )
                              );
                          }
                      });
                  });


                  // =================================================
                  // Request Timeout Protection
                  // =================================================
                  req.setTimeout(5000, () => {

                      req.destroy(
                          new Error('Request timeout')
                      );
                  });


                  req.on('error', reject);

                  req.write(data);

                  req.end();
              });
          }



          // =================================================
          // Lambda Entrypoint
          // =================================================
          exports.handler = async (event) => {

              console.log(
                  `Records received: ${event.Records?.length || 0}`
              );


              // =================================================
              // SNS Can Batch Multiple Records
              // =================================================
              for (const record of event.Records || []) {

                  const region =
                      getRegionFromArn(record.Sns.TopicArn);


                  // =================================================
                  // Safe JSON Parsing
                  // =================================================
                  let message;

                  try {

                      message = JSON.parse(
                          record.Sns.Message
                      );

                  } catch (err) {

                      console.error(
                          'Invalid SNS message JSON',
                          err
                      );

                      continue;
                  }


                  // =================================================
                  // Extract Alarm Details
                  // =================================================
                  const alarm = {

                      alarm_name:
                          message.AlarmName || 'Unknown Alarm',

                      description:
                          message.AlarmDescription || 'No description provided',

                      state:
                          message.NewStateValue || 'UNKNOWN',

                      previous_state:
                          message.OldStateValue || 'UNKNOWN',

                      reason:
                          message.NewStateReason || 'No reason provided',

                      account_id:
                          message.AWSAccountId || 'Unknown',

                      region,

                      namespace:
                          message.Trigger?.Namespace || 'Unknown',

                      metric_name:
                          message.Trigger?.MetricName || 'Unknown',

                      timestamp:
                          message.StateChangeTime || new Date().toISOString()
                  };


                  console.log(
                      `Alarm: ${alarm.alarm_name} | State: ${alarm.state}`
                  );


                  // =================================================
                  // Build Slack Payload
                  // =================================================
                  const payload = buildSlackMessage(alarm);


                  // Ignore Unwanted Transitions
                  if (!payload) {

                      console.log(
                          'Skipped non-important state transition'
                      );

                      continue;
                  }


                  // =================================================
                  // Retry Slack Delivery
                  // =================================================
                  let sent = false;

                  for (let i = 0; i < 3; i++) {

                      try {

                          await sendToSlack(payload);

                          sent = true;

                          break;

                      } catch (err) {

                          console.error(
                              `Retry ${i + 1} failed`,
                              err
                          );

                          // Small Delay Before Retry
                          await new Promise(
                              resolve => setTimeout(resolve, 1000)
                          );

                          if (i === 2) {

                              throw err;
                          }
                      }
                  }


                  if (!sent) {

                      throw new Error(
                          'Failed to send Slack alert'
                      );
                  }


                  console.log(
                      `Sent to Slack | Alarm: ${alarm.alarm_name}`
                  );
              }


              return {

                  statusCode: 200,

                  body: 'OK'
              };
          };


      Tags:

        - Key: Project
          Value: Monitoring

        - Key: ManagedBy
          Value: CloudFormation




  # =========================================================
  # CloudWatch Log Retention
  # =========================================================
  SlackAlertLogGroup:

    Type: AWS::Logs::LogGroup

    Properties:

      LogGroupName: !Sub /aws/lambda/${SlackAlertLambda}

      RetentionInDays: 14




  # =========================================================
  # SNS Subscription
  # =========================================================
  SlackAlertsSubscription:

    Type: AWS::SNS::Subscription

    DependsOn:
      - LambdaInvokePermission

    Properties:

      TopicArn: !Ref SlackAlertsTopic

      Protocol: lambda

      Endpoint: !GetAtt SlackAlertLambda.Arn




  # =========================================================
  # Lambda Invoke Permission
  # =========================================================
  LambdaInvokePermission:

    Type: AWS::Lambda::Permission

    Properties:

      FunctionName: !Ref SlackAlertLambda

      Action: lambda:InvokeFunction

      Principal: sns.amazonaws.com

      SourceArn: !Ref SlackAlertsTopic




  # =========================================================
  # CloudWatch Alarm
  # =========================================================
  HighCPUAlarm:

    Type: AWS::CloudWatch::Alarm

    Properties:

      AlarmName: !Sub ${AWS::StackName}-high-cpu

      AlarmDescription: EC2 CPU Utilization High

      Namespace: AWS/EC2

      MetricName: CPUUtilization

      Statistic: Average

      Period: 300

      EvaluationPeriods: 3

      DatapointsToAlarm: 2

      Threshold: 80

      ComparisonOperator: GreaterThanThreshold

      TreatMissingData: ignore

      Dimensions:

        - Name: InstanceId

          Value: !Ref EC2InstanceId


      AlarmActions:

        - !Ref SlackAlertsTopic


      OKActions:

        - !Ref SlackAlertsTopic


      Tags:

        - Key: Project
          Value: Monitoring

        - Key: ManagedBy
          Value: CloudFormation




# =========================================================
# Outputs
# =========================================================
Outputs:


  SNSArn:

    Description: SNS Topic ARN

    Value: !Ref SlackAlertsTopic


  LambdaArn:

    Description: Lambda Function ARN

    Value: !GetAtt SlackAlertLambda.Arn


  AlarmName:

    Description: CloudWatch Alarm Name

    Value: !Ref HighCPUAlarm