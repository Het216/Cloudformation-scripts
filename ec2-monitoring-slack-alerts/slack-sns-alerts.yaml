# =========================================================
# CloudFormation Template Version
# =========================================================
# Defines CloudFormation template format version
AWSTemplateFormatVersion: "2010-09-09"

# =========================================================
# Stack Description
# =========================================================
# Visible in CloudFormation Console
Description: EC2 CloudWatch Slack Alert Infrastructure

# =========================================================
# Parameters Section
# =========================================================
# User-provided inputs during stack deployment
Parameters:
  SlackWebhookUrl:
    Type: String
    NoEcho: true

  EC2InstanceId:
    Type: AWS::EC2::Instance::Id

# =========================================================
# Resources Section
# =========================================================
# All AWS infrastructure resources are defined here
Resources:
  # =========================================================
  # SNS Topic
  # =========================================================
  # SNS acts as notification/event hub
  # CloudWatch Alarm sends events here
  # Lambda subscribes to this topic
  SlackAlertsTopic:
    # AWS SNS Topic resource type
    Type: AWS::SNS::Topic

    Properties:
      #  Actual SNS Topic name
      TopicName: !Sub ${AWS::StackName}-slack-alerts

  # =========================================================
  # IAM Role For Lambda
  # =========================================================
  # Lambda needs permissions to run
  # and write logs to CloudWatch
  SlackAlertLambdaRole:
    # AWS IAM Role resource type
    Type: AWS::IAM::Role

    Properties:
      # Actual IAM Role name
      RoleName: !Sub ${AWS::StackName}-slack-alert-role

      # =====================================================
      # Trust Policy
      # =====================================================
      # Defines WHO can use this role
      # Here:
      # Lambda service can assume this role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"

        Statement:
          - Effect: Allow

            # AWS Lambda service principal
            Principal:
              Service:
                - lambda.amazonaws.com

            # Permission to assume role
            Action:
              - sts:AssumeRole

      # =====================================================
      # Managed IAM Policies
      # =====================================================
      # Gives Lambda permission to:
      # - create log groups
      # - create log streams
      # - write CloudWatch logs
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # =========================================================
  # Lambda Function
  # =========================================================
  # Lambda receives SNS events
  # formats Slack message
  # sends webhook request to Slack
  SlackAlertLambda:
    # AWS Lambda resource type
    Type: AWS::Lambda::Function

    Properties:
      # Actual Lambda function name
      FunctionName: !Sub ${AWS::StackName}-slack-alert-handler

      # Lambda runtime
      Runtime: nodejs20.x

      # Lambda handler format:
      # filename.functionName
      #
      # Means:
      # index.js → handler()
      Handler: index.handler

      # Attach IAM Role to Lambda
      # !GetAtt fetches Role ARN
      Role: !GetAtt SlackAlertLambdaRole.Arn

      # Maximum execution timeout
      Timeout: 15

      # Limit concurrent executions to prevent overload
      # ReservedConcurrentExecutions: 2 will uncomment this line and set concurrency limit to 2

      # =====================================================
      # Environment Variables
      # =====================================================
      # Used for configuration/secrets
      Environment:
        Variables:
          # Slack Incoming Webhook URL
          # NOTE: never place secret hardcoded instead use parameters
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl

      # =====================================================
      # Inline Lambda Code
      # =====================================================
      # CloudFormation directly deploys this code
      # No S3 needed currently
      # =====================================================
      # Further Improvements can be made to load code from S3 for better maintainability
      # =====================================================
      # Replce ZipFile with S3Bucket and S3Key properties to load code from S3
      #Sample S3 code loading:
      # =====================================================
      # Code:
      #   S3Bucket: your-code-bucket
      #   S3Key: path/to/your/lambda-code.zip
      # =====================================================
      # This allows for better code management and separation of infrastructure and application code
      Code:
        ZipFile: |

          const https = require('https');
          const { URL } = require('url');

          const SLACK_WEBHOOK_URL = process.env.SLACK_WEBHOOK_URL;

          // Alert styling configuration
          const ALARM_CONFIG = {

              ALARM: {
                  color: '#FF0000',
                  emoji: '[CRITICAL]',
                  label: 'CRITICAL ALERT'
              },

              OK: {
                  color: '#36A64F',
                  emoji: '[OK]',
                  label: 'RESOLVED'
              }
          };


          // Extract AWS region from SNS ARN
          function getRegionFromArn(arn) {

              try {
                  return arn.split(':')[3];

              } catch {
                  return 'us-east-1';
              }
          }


          // Format timestamp
          function formatTimestamp(timestamp) {

              try {
                  return new Date(timestamp).toISOString();

              } catch {
                  return timestamp;
              }
          }


          // Build Slack message payload
          function buildSlackMessage(alarm) {

              // Ignore:
              // INSUFFICIENT_DATA -> OK
              if (
                  alarm.previous_state === 'INSUFFICIENT_DATA' &&
                  alarm.state === 'OK'
              ) {
                  return null;
              }

              let config;


              // Real resolved alert
              if (
                  alarm.previous_state === 'ALARM' &&
                  alarm.state === 'OK'
              ) {

                  config = ALARM_CONFIG.OK;

              }

              // Critical alert
              else if (alarm.state === 'ALARM') {

                  config = ALARM_CONFIG.ALARM;

              }

              // Ignore all other transitions
              else {

                  return null;
              }


              // CloudWatch Alarm Console Link
              const alarmLink =
                  `https://${alarm.region}.console.aws.amazon.com/cloudwatch/home` +
                  `?region=${alarm.region}#alarmsV2:alarm/${encodeURIComponent(alarm.alarm_name)}`;


              return {

                  attachments: [{

                      color: config.color,

                      blocks: [

                          {
                              type: "header",

                              text: {
                                  type: "plain_text",

                                  text:
                                  `${config.emoji} ${config.label}: ${alarm.alarm_name}`,

                                  emoji: true
                              }
                          },

                          {
                              type: "section",

                              fields: [

                                  {
                                      type: "mrkdwn",

                                      text:
                                      `*Metric:*\\n${alarm.namespace} -> ${alarm.metric_name}`
                                  },

                                  {
                                      type: "mrkdwn",

                                      text:
                                      `*State Change:*\\n${alarm.previous_state} -> *${alarm.state}*`
                                  },

                                  {
                                      type: "mrkdwn",

                                      text:
                                      `*Account ID:*\\n\\`${alarm.account_id}\\``
                                  },

                                  {
                                      type: "mrkdwn",

                                      text:
                                      `*Time:*\\n${formatTimestamp(alarm.timestamp)}`
                                  }
                              ]
                          },

                          {
                              type: "section",

                              text: {
                                  type: "mrkdwn",

                                  text:
                                  `*Description:*\\n${alarm.description}`
                              }
                          },

                          {
                              type: "section",

                              text: {
                                  type: "mrkdwn",

                                  text:
                                  `*Reason:*\\n${alarm.reason}`
                              }
                          },

                          {
                              type: "section",

                              text: {
                                  type: "mrkdwn",

                                  text:
                                  `<${alarmLink}|[VIEW] View Alarm in AWS Console>`
                              }
                          }
                      ]
                  }]
              };
          }


          // Send message to Slack webhook
          function sendToSlack(payload) {

              return new Promise((resolve, reject) => {

                  const url = new URL(SLACK_WEBHOOK_URL);

                  const data = JSON.stringify(payload);

                  const options = {

                      hostname: url.hostname,

                      path: url.pathname + url.search,

                      method: 'POST',

                      headers: {
                          'Content-Type': 'application/json',
                          'Content-Length': Buffer.byteLength(data)
                      }
                  };


                  const req = https.request(options, (res) => {

                      let responseBody = '';

                      res.on('data', chunk => {
                          responseBody += chunk;
                      });

                      res.on('end', () => 
                      {

                        if (
                            res.statusCode >= 200 &&
                            res.statusCode < 300
                        ) {

                            resolve(responseBody);

                        } else {

                            reject(

                                new Error(

                                    `Slack webhook failed: ${res.statusCode} ${responseBody}`
                                )
                            );
                        }
                    });
                  });

                  // Request timeout protection
                    req.setTimeout(5000, () => {

                        req.destroy(
                            new Error('Request timeout')
                        );
                    });


                  req.on('error', reject);

                  req.write(data);

                  req.end();
              });
          }



          // =================================================
          // Lambda Entrypoint
          // =================================================
          exports.handler = async (event) => {

              console.log(
                  'Event received:',
                  JSON.stringify(event, null, 2)
              );


              // SNS can batch multiple records
              for (const record of event.Records || []) {

                  const region =
                      getRegionFromArn(record.Sns.TopicArn);

                  const message =
                      JSON.parse(record.Sns.Message);


                  // Extract CloudWatch Alarm details
                  const alarm = {

                      alarm_name:
                          message.AlarmName || 'Unknown Alarm',

                      description:
                          message.AlarmDescription || 'No description provided',

                      state:
                          message.NewStateValue || 'UNKNOWN',

                      previous_state:
                          message.OldStateValue || 'UNKNOWN',

                      reason:
                          message.NewStateReason || 'No reason provided',

                      account_id:
                          message.AWSAccountId || 'Unknown',

                      region,

                      namespace:
                          message.Trigger?.Namespace || 'Unknown',

                      metric_name:
                          message.Trigger?.MetricName || 'Unknown',

                      timestamp:
                          message.StateChangeTime || new Date().toISOString()
                  };


                  console.log(
                      `Alarm: ${alarm.alarm_name} | State: ${alarm.state}`
                  );


                  // Create Slack payload
                  const payload = buildSlackMessage(alarm);


                  // Ignore unwanted transitions
                  if (!payload) {

                      console.log(
                          'Skipped non-important state transition'
                      );

                      continue;
                  }


                  // Send Slack message
                    let sent = false;

                    for (let i = 0; i < 3; i++) {

                        try {

                            await sendToSlack(payload);

                            sent = true;

                            break;

                        } catch (err) {

                            console.error(
                                `Retry ${i + 1} failed`,
                                err
                            );

                            if (i === 2) {
                                throw err;
                            }
                        }
                    }

                    if (!sent) {

                        throw new Error(
                            'Failed to send Slack alert'
                        );
                    }


                  console.log(
                      ` Sent to Slack | Alarm: ${alarm.alarm_name}`
                  );
              }


              return {
                  statusCode: 200,
                  body: 'OK'
              };
          };

  # =========================================================
  # CloudWatch Log Group
  # =========================================================
  # Controls Lambda log retention
  # Prevents logs from staying forever

  SlackAlertLogGroup:
    Type: AWS::Logs::LogGroup

    DeletionPolicy: Delete

    UpdateReplacePolicy: Delete

    Properties:
      LogGroupName: !Sub /aws/lambda/${SlackAlertLambda}

      # Set log retention to 14 days to prevent indefinite storage and manage costs
      RetentionInDays: 14

  # =========================================================
  # SNS Subscription
  # =========================================================
  # Connect SNS Topic -> Lambda
  SlackAlertsSubscription:
    # AWS SNS Subscription resource type
    Type: AWS::SNS::Subscription

    # Ensure Lambda permission is created before subscription
    DependsOn: 
        - LambdaInvokePermission

    Properties:
      # SNS Topic ARN
      TopicArn: !Ref SlackAlertsTopic

      # Subscription protocol
      # Target type is Lambda
      Protocol: lambda

      # Lambda ARN to invoke
      Endpoint: !GetAtt SlackAlertLambda.Arn

  # =========================================================
  # Lambda Invoke Permission
  # =========================================================
  # SNS cannot invoke Lambda automatically
  # unless explicit permission is granted
  LambdaInvokePermission:
    # AWS Lambda Permission resource type
    Type: AWS::Lambda::Permission

    Properties:
      # Lambda function name
      FunctionName: !Ref SlackAlertLambda

      # Allowed action
      Action: lambda:InvokeFunction

      # AWS SNS service principal
      Principal: sns.amazonaws.com

      # Restrict permission ONLY to this SNS topic
      SourceArn: !Ref SlackAlertsTopic

  # =========================================================
  # CloudWatch Alarm
  # =========================================================
  # Monitors EC2 CPU Utilization
  HighCPUAlarm:
    # AWS CloudWatch Alarm resource type
    Type: AWS::CloudWatch::Alarm

    Properties:
      # Alarm name
      AlarmName: !Sub ${AWS::StackName}-high-cpu

      # Alarm description
      AlarmDescription: EC2 CPU Utilization High

      # AWS metric namespace
      Namespace: AWS/EC2

      # Metric name
      MetricName: CPUUtilization

      # Aggregation type
      Statistic: Average

      # Evaluation period in seconds
      # 300 = 5 minutes
      Period: 300

      # Number of evaluation periods
      EvaluationPeriods: 3

      # Alarm triggers if 2 datapoints breach threshold
      DatapointsToAlarm: 2

      # CPU threshold
      Threshold: 80

      # Trigger if metric exceeds threshold
      ComparisonOperator: GreaterThanThreshold

      # Ignore missing datapoints
      TreatMissingData: ignore

      # =====================================================
      # EC2 Instance To Monitor
      # =====================================================
      Dimensions:
        - Name: InstanceId

          # pass EC2 instance ID as parameter
          Value: !Ref EC2InstanceId

      # =====================================================
      # SNS Action When Alarm Triggers
      # =====================================================
      AlarmActions:
        - !Ref SlackAlertsTopic

      # =====================================================
      # SNS Action When Alarm Recovers
      # =====================================================
      OKActions:
        - !Ref SlackAlertsTopic

# =========================================================
# Outputs Section
# =========================================================
# Useful values after deployment
Outputs:
  # SNS Topic ARN output
  SNSArn:
    Description: SNS Topic ARN

    Value: !Ref SlackAlertsTopic

  # Lambda ARN output
  LambdaArn:
    Description: Lambda Function ARN

    Value: !GetAtt SlackAlertLambda.Arn

  # Alarm name output
  AlarmName:
    Description: CloudWatch Alarm Name

    Value: !Ref HighCPUAlarm
